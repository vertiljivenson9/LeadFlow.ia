<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Abstract Flow/Pipeline Symbol -->
  <g transform="translate(4, 8)">
    <!-- Central pipeline flow -->
    <path d="M8 24 Q16 8, 28 16 T48 12" stroke="url(#flowGradient)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M8 32 Q20 20, 32 28 T48 24" stroke="url(#flowGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M12 40 Q24 32, 36 36 T48 36" stroke="url(#flowGradient)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Lead nodes -->
    <circle cx="8" cy="28" r="6" fill="url(#logoGradient)" opacity="0.9"/>
    <circle cx="28" cy="18" r="5" fill="url(#logoGradient)" opacity="0.8"/>
    <circle cx="48" cy="24" r="7" fill="url(#logoGradient)"/>
    
    <!-- Sparkle/AI indicator -->
    <g transform="translate(44, 8)">
      <path d="M4 0 L4.5 3 L8 4 L4.5 5 L4 8 L3.5 5 L0 4 L3.5 3 Z" fill="#FBBF24"/>
    </g>
  </g>
  
  <!-- Text: LeadFlow -->
  <text x="68" y="38" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1F2937">
    Lead<tspan fill="url(#logoGradient)">Flow</tspan>
  </text>
  
  <!-- Text: AI Badge -->
  <g transform="translate(188, 18)">
    <rect x="0" y="0" width="28" height="20" rx="4" fill="url(#logoGradient)"/>
    <text x="14" y="14" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">AI</text>
  </g>
  
  <!-- Tagline -->
  <text x="68" y="54" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#6B7280" letter-spacing="1">
    INTELLIGENT LEAD MANAGEMENT
  </text>
</svg>